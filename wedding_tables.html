<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Wedding Seating — Caroline & Joshua</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>

  <style>
    :root {
      /* ── Sage green + dusty blue palette ─────────────────────────────
         --blue / --blue-lt : dusty steel-blue accent (replaces gold)
         --sage / --sage-lt : soft sage green accent
         --cream / --ivory  : cool linen base tones                     */
      --cream:   #f0f4f2;           /* cool sage-mist background        */
      --ivory:   #e4eceb;           /* soft blue-green panel tint       */
      --blue:    #6f8fa6;           /* dusty steel blue — primary accent */
      --blue-lt: #8daec3;           /* lighter dusty blue               */
      --sage:    #6b8f72;           /* medium sage green                */
      --sage-lt: #95b89a;           /* lighter sage green               */
      --dark:    #243028;           /* deep forest-dark for text        */
      --mid:     #4d6158;           /* mid-tone sage-slate              */
      --soft:    #afc0b7;           /* muted sage-grey for borders      */
      --white:   #ffffff;
      --shadow:  0 4px 32px rgba(36,48,40,0.10);
      --r:       12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--cream);
      color: var(--dark);
      min-height: 100dvh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(111,143,166,0.09) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(107,143,114,0.07) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ── Hero header ─────────────────────────────────────────────────
       Displays couple names, date, and decorative ornaments at the top. */
    .hero { position: relative; z-index: 1; text-align: center; padding: 52px 24px 36px; border-bottom: 1px solid rgba(111,143,166,0.25); }
    .hero-ornament { display: block; font-size: 1.5rem; color: var(--blue); letter-spacing: 0.4em; margin-bottom: 10px; opacity: 0.7; }
    .hero h1 { font-family: 'Cinzel', serif; font-size: clamp(1.8rem, 6vw, 3.2rem); font-weight: 400; color: var(--dark); line-height: 1.2; letter-spacing: 0.05em; }
    .hero h1 em { font-style: italic; color: var(--sage); font-family: 'Cormorant Garamond', serif; font-size: 1.15em; }
    .hero-date { margin-top: 8px; font-size: 0.85rem; letter-spacing: 0.3em; color: var(--mid); text-transform: uppercase; }
    .hero-divider { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 18px auto 0; max-width: 280px; }
    .hero-divider span { flex: 1; height: 1px; background: var(--soft); }
    .hero-divider svg { color: var(--blue); flex-shrink: 0; }

    /* ── Search bar ──────────────────────────────────────────────────
       z-index: 10 keeps the suggestions dropdown above the result card
       that appears lower on the page (which sits at z-index: 1).      */
    .search-wrap { position: relative; z-index: 10; max-width: 560px; margin: 36px auto 0; padding: 0 20px; }
    .search-label { display: block; font-size: 0.85rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--mid); margin-bottom: 10px; text-align: center; }
    .search-box { position: relative; }
    .search-box > svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--blue-lt); pointer-events: none; }
    #searchInput {
      width: 100%; padding: 16px 16px 16px 48px;
      font-family: 'Cormorant Garamond', serif; font-size: 1.15rem;
      color: var(--dark); background: var(--white);
      border: 1.5px solid var(--soft); border-radius: var(--r);
      box-shadow: var(--shadow); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #searchInput::placeholder { color: var(--soft); }
    #searchInput:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(111,143,166,0.15), var(--shadow); }

    /* ── Suggestions dropdown ────────────────────────────────────────
       Absolutely positioned below the search input.
       z-index: 100 keeps it above all page content within the
       search-wrap stacking context (z-index: 10).                     */
    #suggestions {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--white); border: 1px solid var(--soft);
      border-radius: var(--r); box-shadow: 0 8px 40px rgba(36,48,40,0.12);
      z-index: 100; overflow: hidden; display: none;
    }
    #suggestions.open { display: block; }
    .suggestion-item {
      padding: 13px 18px;
      cursor: pointer;
      font-size: 1.05rem;
      color: var(--dark);
      border-bottom: 1px solid var(--ivory);
      transition: background 0.12s;

      display: flex;
      align-items: center;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover, .suggestion-item.active { background: var(--ivory); }
    .suggestion-item .highlight { color: var(--blue); font-weight: 600; }
    .suggestion-item .table-badge {
      margin-left: auto;

      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--mid);
      background: var(--ivory);
      border: 1px solid var(--soft);
      border-radius: 20px;
      padding: 2px 9px;
      white-space: nowrap;
    }
    .no-results { padding: 16px 18px; color: var(--mid); font-style: italic; font-size: 1rem; }

    /* ── Result card ─────────────────────────────────────────────────
       Shown after a guest is selected from the search.
       z-index: 1 — sits below the search-wrap (z-index: 10) so the
       suggestions dropdown always renders on top of this card.         */
    #resultCard { position: relative; z-index: 1; max-width: 560px; margin: 28px auto 0; padding: 0 20px; display: none; }
    #resultCard.visible { display: block; animation: fadeUp 0.35s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .card { background: var(--white); border-radius: 16px; box-shadow: var(--shadow); overflow: hidden; }

    .card-header {
      background: linear-gradient(135deg, var(--sage) 0%, var(--blue) 100%);
      padding: 28px 28px 22px; color: white; text-align: center;
      position: relative;
    }
    /* ── Close button ── */
    .card-close {
      position: absolute; top: 12px; right: 12px;
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.18); border: none; border-radius: 50%;
      cursor: pointer; color: white; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; line-height: 1;
    }
    .card-close:hover { background: rgba(255,255,255,0.35); }

    .card-header .guest-name { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-style: italic; font-weight: 400; }
    .card-header .at-label { font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase; opacity: 0.8; margin-top: 6px; font-family: 'Cinzel', serif; }
    .card-header .table-name { font-family: 'Cinzel', serif; font-size: 2.4rem; font-weight: 600; line-height: 1; margin-top: 6px; color: var(--cream); letter-spacing: 0.05em; }
    .card-body { padding: 22px 28px 26px; }
    .card-body h3 { font-size: 0.72rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--mid); margin-bottom: 14px; font-family: 'Cinzel', serif; }
    .tablemates { list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .tablemates li { font-size: 1rem; color: var(--dark); display: flex; align-items: center; gap: 7px; }
    .tablemates li::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--sage-lt); flex-shrink: 0; }
    .tablemates li.is-you { color: var(--blue); font-weight: 600; }
    .tablemates li.is-you::before { background: var(--blue); }

    /* ── Floor plan section ──────────────────────────────────────────
       Contains the SVG venue map.  Tables are clickable — clicking one
       shows the result card for that table.                            */
    .floorplan-section { position: relative; z-index: 1; max-width: 700px; margin: 36px auto 60px; padding: 0 20px; }
    .section-title { text-align: center; margin-bottom: 20px; }
    .section-title h2 { font-family: 'Cinzel', serif; font-size: 1.3rem; font-weight: 400; color: var(--dark); letter-spacing: 0.08em; }
    .section-title p { font-size: 0.85rem; color: var(--mid); letter-spacing: 0.1em; margin-top: 4px; }
    .floorplan-wrap { background: var(--white); border-radius: 16px; box-shadow: var(--shadow); padding: 24px 16px 20px; overflow: hidden; }
    #floorSvg { width: 100%; height: auto; display: block; }

    /* ── Custom SVG table highlight classes ──────────────────────────
       .svg-table-idle   : default appearance for every tagged table shape
       .svg-table-active : highlighted when a matching guest is found
       stroke-width: 0.6 keeps borders thin and elegant.               */
    .svg-table-idle {
      fill: var(--ivory) !important; stroke: var(--soft) !important;
      stroke-width: 0.6 !important; cursor: pointer;
      transition: fill 0.18s, stroke 0.18s;
    }
    .svg-table-idle:hover { fill: #d6e4e0 !important; stroke: var(--blue-lt) !important; }
    .svg-table-active {
      fill: var(--sage) !important; stroke: var(--sage) !important;
      stroke-width: 0.6 !important;
      cursor: pointer; animation: tablePulse 1.8s ease-in-out infinite;
    }
    .svg-label-idle  { fill: var(--mid) !important; }
    .svg-label-active { fill: white !important; font-weight: 600 !important; }

    /* ── Built-in floor plan element styles ─────────────────────────
       Used only when no custom SVG is provided (isCustomSvg === false).
       stroke-width: 0.6 keeps table outlines thin.                    */
    .table-circle { fill: var(--ivory); stroke: var(--soft); stroke-width: 0.6; cursor: pointer; transition: all 0.2s; }
    .table-circle:hover { fill: #d6e4e0; stroke: var(--blue-lt); }
    .table-circle.highlighted { fill: var(--sage); stroke: var(--sage); animation: tablePulse 1.8s ease-in-out infinite; }
    .table-label { font-family: 'Cinzel', serif; font-size: 11px; fill: var(--mid); text-anchor: middle; dominant-baseline: central; pointer-events: none; }
    .table-label.highlighted { fill: white; font-weight: 600; }
    .head-table-rect { fill: var(--ivory); stroke: var(--soft); stroke-width: 0.6; }
    .head-table-rect.highlighted { fill: var(--sage); stroke: var(--sage); animation: tablePulse 1.8s ease-in-out infinite; }
    .room-outline { fill: #eaf0ee; stroke: #c4d4cc; stroke-width: 1; }
    .dance-floor { fill: rgba(111,143,166,0.06); stroke: rgba(111,143,166,0.28); stroke-width: 1; stroke-dasharray: 5 3; }
    .room-label { font-family: 'Cormorant Garamond', serif; font-size: 9px; fill: var(--soft); text-anchor: middle; letter-spacing: 1px; }
    .entrance-label { font-family: 'Cormorant Garamond', serif; font-size: 8px; fill: var(--mid); text-anchor: middle; letter-spacing: 0.5px; }

    @keyframes tablePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.75; } }

    /* ── Legend & Footer ─────────────────────────────────────────────
       Legend dots sit beneath the floor plan to explain the colour key.
       Footer is purely decorative/informational text at the bottom.    */
    .legend { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 14px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--mid); }
    .legend-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid var(--soft); background: var(--ivory); }
    .legend-dot.you { background: var(--blue); border-color: var(--blue); }
    footer { position: relative; z-index: 1; text-align: center; padding: 0 20px 40px; font-size: 0.8rem; color: var(--soft); letter-spacing: 0.1em; }
  </style>

<!-- ═══════════════════════════════════════════════════════════════
     HERO HEADER — names, date, and decorative divider
     ═══════════════════════════════════════════════════════════════ -->
<header class="hero">
  <span class="hero-ornament">✦ ✦ ✦</span>
  <h1>Caroline &amp; <em>Joshua</em></h1>
  <p class="hero-date">June 20, 2026 &nbsp;·&nbsp; The Venue CU</p>
  <div class="hero-divider">
    <span></span>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M12 2C6 2 4 7 4 7s-2 5 8 12C20 12 20 7 20 7s-2-5-8-5z"/>
    </svg>
    <span></span>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════════════════
     SEARCH — type a guest name to find their table.
     The suggestions dropdown (#suggestions) is absolutely-positioned
     inside .search-box and will always layer above the result card.
     ═══════════════════════════════════════════════════════════════ -->
<section class="search-wrap">
  <label class="search-label" for="searchInput">Find your seat</label>
  <div class="search-box">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="searchInput" type="search" autocomplete="off" autocorrect="off"
           spellcheck="false" placeholder="Start typing your name…" aria-label="Search for your name" />
    <div id="suggestions" role="listbox" aria-label="Name suggestions"></div>
  </div>
</section>

<!-- ═══════════════════════════════════════════════════════════════
     RESULT CARD — shown after a guest or table is selected.
     Hidden by default (display:none); JS adds .visible to reveal it.
     ═══════════════════════════════════════════════════════════════ -->
<section id="resultCard" aria-live="polite">
  <div class="card">
    <div class="card-header">
      <button class="card-close" id="cardClose" aria-label="Dismiss">✕</button>
      <div class="guest-name" id="cardGuestName">—</div>
      <div class="at-label">You are seated at</div>
      <div class="table-name" id="cardTableName">—</div>
    </div>
    <div class="card-body">
      <h3>Your tablemates</h3>
      <ul class="tablemates" id="cardTablemates"></ul>
    </div>
  </div>
</section>

<!-- ═══════════════════════════════════════════════════════════════
     FLOOR PLAN — SVG venue map.  Each table shape has data-tableid
     matching an entry in GUEST_CSV.  Clicking a table opens the
     result card for that table.
     ═══════════════════════════════════════════════════════════════ -->
<section class="floorplan-section">
  <div class="section-title">
    <h2>Venue Floor Plan</h2>
    <p>Tap any table to see who's seated there</p>
  </div>
  <div class="floorplan-wrap">

    ════════════════════════════════════════════════════════════
    HOW TO USE YOUR OWN SVG FLOOR PLAN
    ════════════════════════════════════════════════════════════
    1. Open your SVG file in a text editor (Notepad, VS Code, etc.)
    2. REPLACE the <svg id="floorSvg" ...></svg> element below
       with your SVG — but keep  id="floorSvg"  on the <svg> tag.
    3. For each table SHAPE (circle, rect, polygon, path…) add:
           data-tableid="Table 1"
       where the value exactly matches a table name in GUEST_CSV.
    4. For each table TEXT LABEL add:
           data-tablelabel="Table 1"
       These will automatically turn white when that table is active.
    5. That's it — highlighting, clicking, and search all work automatically.

    EXAMPLE — in your SVG you might change:
       <circle cx="120" cy="200" r="40" fill="#eee"/>
       <text x="120" y="200">Table 1</text>
    to:
       <circle cx="120" cy="200" r="40" data-tableid="Table 1"/>
       <text x="120" y="200" data-tablelabel="Table 1">Table 1</text>

/* ════════════════════════════════════════════════════════════════

   ════════════════════════════════════════════════════════════════ */
const TABLES = GUEST_CSV
  .split("\n")
  .map(l => l.trim())
  .filter(l => l && !l.startsWith("//"))
  .map(line => {
    const parts = line.split(SEP).map(s => s.trim()).filter(Boolean);
    return { id: parts[0], name: parts[0], guests: parts.slice(1) };

const allGuests = [];
TABLES.forEach(t => t.guests.forEach(g => allGuests.push({ name: g, tableId: t.id, tableName: t.name })));

const fuse = new Fuse(allGuests, { keys: ["name"], threshold: 0.38, includeMatches: true, minMatchCharLength: 2 });

/* ════════════════════════════════════════════════════════════════

const floorSvg = document.getElementById("floorSvg");

function initCustomSvg() {
  floorSvg.querySelectorAll("[data-tableid]").forEach(el => el.classList.add("svg-table-idle"));

}

/* Custom SVG: swap highlight classes */
function highlightCustomSvg(activeId) {
  floorSvg.querySelectorAll("[data-tableid]").forEach(el => {
    const match = el.getAttribute("data-tableid") === activeId;
    el.classList.toggle("svg-table-idle",   !match);
    el.classList.toggle("svg-table-active",  match);

  floorSvg.querySelectorAll("[data-tablelabel]").forEach(el => {
    const match = el.getAttribute("data-tablelabel") === activeId;
    el.classList.toggle("svg-label-idle",   !match);
    el.classList.toggle("svg-label-active",  match);
  });
}

function clearCustomSvg() {
  floorSvg.querySelectorAll("[data-tableid]").forEach(el => {
    el.classList.remove("svg-table-active"); el.classList.add("svg-table-idle");
  });
  floorSvg.querySelectorAll("[data-tablelabel]").forEach(el => {
    el.classList.remove("svg-label-active"); el.classList.add("svg-label-idle");
  });
}

/* Built-in SVG renderer */
function buildBuiltinFloorPlan(highlightId = null) {
  const fp = FLOOR_PLAN;
  let h = "";
  h += `<rect class="room-outline" x="${fp.room.x}" y="${fp.room.y}" width="${fp.room.w}" height="${fp.room.h}" rx="10"/>`;
  h += `<rect class="dance-floor" x="${fp.dance.x}" y="${fp.dance.y}" width="${fp.dance.w}" height="${fp.dance.h}" rx="6"/>`;
  h += `<text class="room-label" x="${fp.dance.x+fp.dance.w/2}" y="${fp.dance.y+fp.dance.h/2}">DANCE FLOOR</text>`;
  h += `<text class="entrance-label" x="${fp.entrance.x}" y="${fp.entrance.y-6}">▼ ENTRANCE</text>`;

  fp.tables.forEach(t => {
    const td = TABLES.find(d => d.id === t.id);
    if (!td) return;
    const hl = t.id === highlightId;
    if (t.type === "head") {
      const rx = t.x - t.w/2, ry = t.y - t.h/2;
      h += `<rect class="head-table-rect${hl?" highlighted":""}" x="${rx}" y="${ry}" width="${t.w}" height="${t.h}" rx="6" data-tableid="${t.id}" style="cursor:pointer"/>`;
      h += `<text class="table-label${hl?" highlighted":""}" x="${t.x}" y="${t.y}" style="font-size:10px;pointer-events:none">${td.name}</text>`;
    } else {
      h += `<circle class="table-circle${hl?" highlighted":""}" cx="${t.x}" cy="${t.y}" r="${t.r}" data-tableid="${t.id}"/>`;
      h += `<text class="table-label${hl?" highlighted":""}" x="${t.x}" y="${t.y}" style="pointer-events:none">${td.name}</text>`;
    }
  });
  floorSvg.innerHTML = h;
  bindFloorClicks();
}

function bindFloorClicks() {
  floorSvg.querySelectorAll("[data-tableid]").forEach(el => {
    el.addEventListener("click", () => {
      const tid = el.getAttribute("data-tableid");
      showResult({ name: null, tableId: tid }, true);
    });
  });
}

function updateFloor(highlightId) {
  if (isCustomSvg) highlightCustomSvg(highlightId);
  else             buildBuiltinFloorPlan(highlightId);
}
function clearFloor() {
  if (isCustomSvg) clearCustomSvg();
  else             buildBuiltinFloorPlan(null);
}

/* ════════════════════════════════════════════════════════════════
   RESULT CARD
   ════════════════════════════════════════════════════════════════ */
function showResult(guest, fromMap = false) {
  const td = TABLES.find(t => t.id === guest.tableId);
  if (!td) return;

  document.getElementById("cardGuestName").textContent = fromMap ? td.name : guest.name;
  document.getElementById("cardTableName").textContent = td.name;
  document.getElementById("cardTablemates").innerHTML = td.guests.map(g => {
    const you = !fromMap && g === guest.name;
    return `<li class="${you?"is-you":""}">${g}${you?" ← You":""}</li>`;
  }).join("");

  const card = document.getElementById("resultCard");
  card.style.display = "none";
  card.classList.remove("visible");
  void card.offsetHeight;
  card.style.display = "block";
  card.classList.add("visible");

  updateFloor(td.id);
  setTimeout(() => card.scrollIntoView({ behavior:"smooth", block:"nearest" }), 60);
}

function hideResult() {
  const card = document.getElementById("resultCard");
  card.style.display = "none";
  card.classList.remove("visible");
  clearFloor();
}

document.getElementById("cardClose").addEventListener("click", hideResult);

/* ════════════════════════════════════════════════════════════════
   SEARCH
   ════════════════════════════════════════════════════════════════ */
const searchInput   = document.getElementById("searchInput");
const suggestionsEl = document.getElementById("suggestions");
let activeIdx = -1;

const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function hlMatch(text, indices) {
  if (!indices?.length) return esc(text);
  let out = "", last = 0;
  indices.forEach(([s,e]) => { out += esc(text.slice(last,s)) + `<span class="highlight">${esc(text.slice(s,e+1))}</span>`; last=e+1; });
  return out + esc(text.slice(last));
}

function renderSuggestions(results) {
  activeIdx = -1;
  if (!results.length) {
    suggestionsEl.innerHTML = `<div class="no-results">No guest found — try a different spelling</div>`;
    suggestionsEl.classList.add("open"); return;
  }
  suggestionsEl.innerHTML = results.slice(0,6).map((r,i) => {
    const idx = r.matches?.find(m=>m.key==="name")?.indices||[];
    return `<div class="suggestion-item" role="option" tabindex="-1" data-tableid="${esc(r.item.tableId)}" data-name="${esc(r.item.name)}">${hlMatch(r.item.name, idx)}<span class="table-badge">${esc(r.item.tableName)}</span></div>`;
  }).join("");
  suggestionsEl.classList.add("open");
  suggestionsEl.querySelectorAll(".suggestion-item").forEach(el => {
    el.addEventListener("click", () => pick(el));
    el.addEventListener("touchend", e => { e.preventDefault(); pick(el); });
  });
}

function pick(el) {
  const name = el.getAttribute("data-name");
  const tid  = el.getAttribute("data-tableid");
  searchInput.value = name;
  closeSugg();
  const g = allGuests.find(g => g.name===name && g.tableId===tid);
  if (g) showResult(g);
}
function closeSugg() { suggestionsEl.classList.remove("open"); activeIdx=-1; }

searchInput.addEventListener("input", () => {
  const q = searchInput.value.trim();
  if (q.length < 2) { closeSugg(); return; }
  renderSuggestions(fuse.search(q));
});
searchInput.addEventListener("keydown", e => {
  const items = suggestionsEl.querySelectorAll(".suggestion-item");
  if (e.key==="ArrowDown") { e.preventDefault(); activeIdx=Math.min(activeIdx+1,items.length-1); items.forEach((el,i)=>el.classList.toggle("active",i===activeIdx)); }
  else if (e.key==="ArrowUp") { e.preventDefault(); activeIdx=Math.max(activeIdx-1,-1); items.forEach((el,i)=>el.classList.toggle("active",i===activeIdx)); }
  else if (e.key==="Enter" && activeIdx>=0) { e.preventDefault(); pick(items[activeIdx]); }
  else if (e.key==="Escape") closeSugg();
});
document.addEventListener("click", e => { if (!e.target.closest(".search-box")) closeSugg(); });

/* Init */
if (isCustomSvg) initCustomSvg();
else             buildBuiltinFloorPlan();
</script>
</body>
